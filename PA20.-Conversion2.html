<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conversion 2</title>
    <link rel="stylesheet" href="PA20.-Conversiones.css">
</head>
<body>
    <div id="contenedorconv" style="background-color: rgb(47, 0, 92);">
        <center>
            
            <h2>Ingresa la cantidad que desees convertir de yardas a pulgadas</h2>
            <br><br> <input type="text" name="yd" id="yd">
            <br><br> <input type="button" name="conv" id="conv" value="Hacer la conversión" onclick="conv()" style="background-color: crimson">
            <br><br> <input type="text" name="pg" id="pg">
            <br><br> <input type="button" name="regresa" id="regresa" value="Regresar al menú inicial" onclick="location.href='PA20.-Menú.html'" style="background-color: crimson;">
        </center>
    </div>
    <script>
        function conv()
        {
            var yardas = document.getElementById('yd').value;
            var pulgadas = parseInt(yardas) * 36;
            document.getElementById('pg').value = yardas + 'pul';
        }
    </script>
</body>
</html>
