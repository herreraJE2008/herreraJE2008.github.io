<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conversion 6</title>
    <link rel="stylesheet" href="PA20.-Conversiones.css">
</head>
<body>
    <div id="contenedorconv" style="background-color: blueviolet;">
        <center>
            <h2>Ingresa la cantidad que desees convertir de miligramos a gramos</h2>
            <br><br> <input type="text" name="mg" id="mg">
            <br><br> <input type="button" name="cn" id="cn" value="Hacer la conversión" onclick="co()" style="background-color: blanchedalmond;">
            <br><br> <input type="text" name="g" id="g">
            <br><br> <input type="button" name="regr" id="regr" value="Regresar al menú inicial" onclick="location.href='PA20.-Menú.html'" style="background-color: blanchedalmond;">
        </center>
    </div>
    <script>
        function co()
        {
            var miligramos = document.getElementById('mg').value;
            var gramos = parseInt(miligramos) / 1000;
            document.getElementById('g').value = gramos + 'g';
        }
    </script>
</body>
</html>
