<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conversion 5</title>
    <link rel="stylesheet" href="PA20.-Conversiones.css">
</head>
<body>
    <div id="contenedorconv" style="background-color: blue;">
        <center>
            <h2>Ingresa la cantidad que desees convertir de decimetros a pulgadas</h2>
            <br><br> <input type="text" name="dm" id="dm">
            <br><br> <input type="button" name="conv" id="conv" value="Hacer la conversión" onclick="convers()" style="background-color: darkgoldenrod;">
            <br><br> <input type="text" name="pg" id="pg">
            <br><br> <input type="button" name="r" id="r" value="Regresar al menú inicial" onclick="location.href='PA20.-Menú.html'" style="background-color: darkgoldenrod;">
        </center>
    </div>
    <script>
        function convers()
        {
            var decimetros = document.getElementById('dm').value;
            var pulgadas = parseInt(decimetros) * 3.397;
            document.getElementById('pg').value = pulgadas + 'pul';
        }
    </script>
</body>
</html>
