<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conversion 7</title>
    <link rel="stylesheet" href="PA20.-Conversiones.css">
</head>
<body>
    <div id="contenedorconv" style="background-color: brown;">
        <center>
            <h2>Ingresa la cantidad que desees convertir de kilogramos a gramos</h2>
            <br><br> <input type="text" name="kg" id="kg">
            <br><br> <input type="button" name="conv" id="conv" value="Hacer la conversión" onclick="conve()" style="background-color: darksalmon;">
            <br><br> <input type="text" name="gr" id="gr">
            <br><br> <input type="button" name="rer" id="rer" value="Regresar al menú inicial" onclick="location.href='PA20.-Menú.html'" style="background-color: darksalmon;">
        </center>
    </div>
    <script>
        function conve()
        {
            var kilogramos = document.getElementById('kg').value;
            var gramos = parseInt(kilogramos) * 1000;
            document.getElementById('gr').value = gramos + 'g';
        }
    </script>
</body>
</html>
